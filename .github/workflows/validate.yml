name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-docs:
    name: Validate Markdown & Structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check required files exist
        run: |
          files=(
            "project.godot"
            "README.md"
            "LICENSE"
            "docs/architecture.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Required file missing: $f"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Check for common issues
        run: |
          # No .DS_Store committed
          if find . -name ".DS_Store" | grep -q .; then
            echo "ERROR: .DS_Store files found in repo"
            exit 1
          fi
          echo "No common issues found."

  gut-tests:
    name: GUT Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Godot import cache
        uses: actions/cache@v5
        with:
          path: .godot
          key: godot-import-${{ runner.os }}-4.6.2-${{ hashFiles('project.godot', '**/*.import') }}
          restore-keys: |
            godot-import-${{ runner.os }}-4.6.2-

      - name: Install Godot
        run: |
          GODOT_VERSION="4.6.2-stable"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q "$GODOT_URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Import project
        run: bash scripts/godot_import.sh

      - name: Run GUT tests
        run: |
          GUT_OUTPUT_FILE="$(mktemp)"
          godot --path "$GITHUB_WORKSPACE" --headless \
            --script res://addons/gut/gut_cmdln.gd -- \
            -gconfig=res://.gutconfig.json -gexit \
            2>&1 | tee "$GUT_OUTPUT_FILE" || true

          # Trust GUT's own summary for pass/fail. On Linux, headless Godot
          # exits non-zero whenever autoload-held resources leak at shutdown
          # (unavoidable engine cleanup), so Godot's exit code is unreliable.
          if ! grep -q "All tests passed" "$GUT_OUTPUT_FILE"; then
            echo "::error::GUT reported test failures (no 'All tests passed' summary found)."
            exit 1
          fi

          # Catch push_error() calls which GDScript emits as "ERROR:" lines but
          # don't fail assertions. The exclusion regex covers:
          #   1. Engine-shutdown cleanup errors (RID/resource leaks emitted
          #      after GUT finishes) — unavoidable in headless runs.
          #   2. Errors emitted by tests that intentionally exercise fail-loud
          #      paths whose `push_error` is a documented production behavior
          #      (and is itself asserted by the validate_issue_*.sh scripts:
          #      ISSUE-008 StoreDirector, ISSUE-010 ContentRegistry uniqueness
          #      / CameraAuthority, ISSUE-019 StoreRegistry).
          #   3. Engine-internal teardown noise that fires after a passing
          #      assertion (autofree race on await-suspended tests, settings
          #      lambda capture during malformed-config reload).
          EXPECTED_ERROR_RE='RID allocations of type .* were leaked at exit\.|resources still in use at exit|ContentRegistry: duplicate (resource|entry) ID|ContentRegistry: alias .* maps to both|\[StoreRegistry\] (unknown store_id|empty store_id|duplicate register store_id)|\[StoreDirector\] .* — unknown store_id|\[CameraAuthority\] (invalid camera|not a Camera2D/Camera3D|expected exactly 1 current camera)|Object is locked and can.t be freed\.|Lambda capture at index 0 was freed\.'
          UNEXPECTED_ERRORS=$(grep "^ERROR:" "$GUT_OUTPUT_FILE" | grep -vE "$EXPECTED_ERROR_RE" || true)
          if [ -n "$UNEXPECTED_ERRORS" ]; then
            ERROR_COUNT=$(echo "$UNEXPECTED_ERRORS" | wc -l | tr -d ' ')
            echo ""
            echo "::error::GUT run produced $ERROR_COUNT push_error() call(s). Tests must not emit errors."
            echo "$UNEXPECTED_ERRORS"
            exit 1
          fi

  interaction-audit:
    name: Interaction Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache Godot import cache
        uses: actions/cache@v5
        with:
          path: .godot
          key: godot-import-${{ runner.os }}-4.6.2-${{ hashFiles('project.godot', '**/*.import') }}
          restore-keys: |
            godot-import-${{ runner.os }}-4.6.2-

      - name: Install Godot
        run: |
          GODOT_VERSION="4.6.2-stable"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q "$GODOT_URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Import project
        run: bash scripts/godot_import.sh

      - name: Run interaction audit
        run: bash tests/audit_run.sh

      - name: Upload audit table
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: interaction-audit-${{ github.run_number }}
          path: docs/audits/

  content-originality:
    name: Content Originality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Grep for banned trademarked terms
        run: |
          set -euo pipefail
          BANNED=(
            "Pokemon" "Pokémon" "Pikachu"
            "Nintendo" "GameBoy" "GameCube" "\bWii\b" "\bNES\b" "\bSNES\b"
            "Blockbuster"
            "\bPSA\b"
            "\bESPN\b"
            "Marvel" "DC Comics"
            "Disney"
            "\bNBA\b" "\bNFL\b" "\bMLB\b" "\bNHL\b" "\bFIFA\b"
            "PlayStation" "Xbox"
            "Adidas" "\bNike\b"
          )
          FAILED=0
          for term in "${BANNED[@]}"; do
            # trademark_validator.gd is the authoritative denylist — its source
            # *must* contain the banned terms verbatim. Exclude it from the scan.
            matches=$(grep -rn --include="*.json" --include="*.gd" -E "$term" \
              game/content/ game/scripts/ game/autoload/ game/scenes/ \
              --exclude-dir=".godot" \
              --exclude="trademark_validator.gd" 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Banned term '$term' found in content or scripts:"
              echo "$matches"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Content originality check failed — remove all trademarked IP references."
            exit 1
          fi
          echo "Content originality check passed — no banned terms found."

  lint-gdscript:
    name: GDScript Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Run gdlint
        run: gdlint game/

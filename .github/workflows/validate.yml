name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-docs:
    name: Validate Markdown & Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          files=(
            "project.godot"
            "README.md"
            "LICENSE"
            "CLAUDE.md"
            "docs/architecture.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Required file missing: $f"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Check for common issues
        run: |
          # No .DS_Store committed
          if find . -name ".DS_Store" | grep -q .; then
            echo "ERROR: .DS_Store files found in repo"
            exit 1
          fi
          echo "No common issues found."

  gut-tests:
    name: GUT Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot import cache
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-import-${{ runner.os }}-4.3-${{ hashFiles('project.godot', '**/*.import') }}
          restore-keys: |
            godot-import-${{ runner.os }}-4.3-

      - name: Install Godot
        run: |
          GODOT_VERSION="4.3-stable"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q "$GODOT_URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Import project
        run: bash scripts/godot_import.sh

      - name: Run GUT tests
        run: godot --path "$GITHUB_WORKSPACE" --headless -s addons/gut/gut_cmdln.gd

  lint-gdscript:
    name: GDScript Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Run gdlint
        run: |
          echo "Running GDScript linter (non-blocking)..."
          gdlint game/ || echo "::warning::GDScript lint issues found — see output above"

name: Export

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-export-config:
    name: Validate Export Config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate export presets
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "export_presets.cfg" ]; then
            echo "::error::export_presets.cfg not found"
            exit 1
          fi

          if [ ! -f "project.godot" ]; then
            echo "::error::project.godot not found"
            exit 1
          fi

          for preset in 'name="Windows Desktop"' 'name="macOS"' 'name="Linux/X11"'; do
            if ! grep -q "$preset" export_presets.cfg; then
              echo "::error::Missing required preset: $preset"
              exit 1
            fi
          done

          ICON_COUNT="$(grep -c '^application/icon="res://icon.svg"$' export_presets.cfg || true)"
          if [ "$ICON_COUNT" -lt 2 ]; then
            echo "::error::Windows and macOS presets must both use res://icon.svg"
            exit 1
          fi

          if ! grep -q '^codesign/enable=false$' export_presets.cfg; then
            echo "::error::Windows preset must not enable built-in code signing"
            exit 1
          fi

          if ! grep -q '^codesign/codesign=0$' export_presets.cfg; then
            echo "::error::macOS preset must not enable built-in code signing"
            exit 1
          fi

          if ! grep -q '^binary_format/architecture="x86_64"$' export_presets.cfg; then
            echo "::error::Windows preset must target x86_64 for Godot export templates"
            exit 1
          fi

          if grep -Eq 'export_path="([A-Za-z]:|/|~)' export_presets.cfg; then
            echo "::error::export_presets.cfg contains an absolute export_path"
            exit 1
          fi

          if grep -q '/Users/' export_presets.cfg; then
            echo "::error::export_presets.cfg contains a local macOS path"
            exit 1
          fi

          if grep -Eq '^codesign/identity="[^"]+"' export_presets.cfg; then
            echo "::error::export_presets.cfg contains a hardcoded code signing identity"
            exit 1
          fi

          if grep -Eq '^codesign/password="[^"]+"' export_presets.cfg; then
            echo "::error::export_presets.cfg contains a hardcoded code signing password"
            exit 1
          fi

          if grep -Eqi '(secret|token|apikey|api_key)' export_presets.cfg; then
            echo "::error::export_presets.cfg appears to contain secret material"
            exit 1
          fi

          if ! grep -q '^textures/vram_compression/import_etc2_astc=true$' project.godot; then
            echo "::error::Universal macOS export requires ETC2 ASTC import support in project.godot"
            exit 1
          fi

  export-windows:
    name: Export Windows Build
    needs: validate-export-config
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Install rcedit
        shell: powershell
        run: |
          npm install --global rcedit
          $npmPrefix = npm prefix -g
          $npmBin = Join-Path $npmPrefix "node_modules\\.bin"
          $npmPrefix | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $npmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          where.exe rcedit

      - name: Create output directory
        shell: bash
        run: mkdir -p build/windows

      - name: Import project assets
        shell: bash
        run: bash scripts/godot_import.sh
        timeout-minutes: 10

      - name: Export Windows
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --export-release \
            "Windows Desktop" \
            "build/windows/MallcoreSim.exe"
        timeout-minutes: 10

      - name: Verify export output
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "build/windows/MallcoreSim.exe" ]; then
            echo "::error::Export failed — MallcoreSim.exe not produced"
            exit 1
          fi
          echo "Export artifact size: $(du -h build/windows/MallcoreSim.exe | cut -f1)"

      - name: Package Windows artifact
        shell: powershell
        run: |
          Compress-Archive -Path "build\windows\MallcoreSim.exe" `
            -DestinationPath "build\windows\mallcore-sim-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build/windows/mallcore-sim-windows.zip
          if-no-files-found: error
          retention-days: 5

  export-macos:
    name: Export macOS Build
    needs: validate-export-config
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Create output directory
        run: mkdir -p build/macos

      - name: Import project assets
        run: bash scripts/godot_import.sh
        timeout-minutes: 10

      - name: Export macOS
        run: |
          set -euo pipefail
          godot --headless --export-release \
            "macOS" \
            "build/macos/mallcore-sim-macos.zip"
        timeout-minutes: 10

      - name: Verify export output
        run: |
          set -euo pipefail
          if [ ! -f "build/macos/mallcore-sim-macos.zip" ]; then
            echo "::error::Export failed — mallcore-sim-macos.zip not produced"
            exit 1
          fi
          echo "Export artifact size: $(du -h build/macos/mallcore-sim-macos.zip | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: build/macos/mallcore-sim-macos.zip
          if-no-files-found: error
          retention-days: 5

  export-linux:
    name: Export Linux Build
    needs: validate-export-config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Create output directory
        run: mkdir -p build/linux

      - name: Import project assets
        run: bash scripts/godot_import.sh
        timeout-minutes: 10

      - name: Export Linux
        run: |
          set -euo pipefail
          godot --headless --export-release \
            "Linux/X11" \
            "build/linux/MallcoreSim.x86_64"
        timeout-minutes: 10

      - name: Verify export output
        run: |
          set -euo pipefail
          if [ ! -f "build/linux/MallcoreSim.x86_64" ]; then
            echo "::error::Export failed — MallcoreSim.x86_64 not produced"
            exit 1
          fi
          echo "Export artifact size: $(du -h build/linux/MallcoreSim.x86_64 | cut -f1)"

      - name: Package Linux artifact
        run: |
          tar -czf build/linux/mallcore-sim-linux.tar.gz \
            -C build/linux MallcoreSim.x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: build/linux/mallcore-sim-linux.tar.gz
          if-no-files-found: error
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: [export-windows, export-macos, export-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-build
          path: artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-build
          path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/macos/mallcore-sim-macos.zip
            artifacts/windows/mallcore-sim-windows.zip
            artifacts/linux/mallcore-sim-linux.tar.gz
